<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApartYonet - Apartman Sayfasi</title>
  <script>
    (function () {
      var host = window.location.hostname.toLowerCase();
      var protocol = window.location.protocol;
      var path = window.location.pathname + window.location.search + window.location.hash;
      if (protocol === "file:") return;
      if (host === "localhost" || host === "127.0.0.1") return;
      if (host === "www.apartyonet.com") {
        window.location.replace("https://apartyonet.com" + path);
        return;
      }
      if (host.endsWith(".vercel.app")) {
        window.location.replace("https://apartyonet.com" + path);
      }
    })();
  </script>
  <style>
    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: #f5f1eb;
      color: #1f2937;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      max-width: 720px;
      background: #fff;
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.6rem;
    }

    p {
      margin: 0;
      color: #4b5563;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Apartman Sayfasi</h1>
    <p>Bu URL apartmana ozel sayfa icin ayrildi. Icerik daha sonra yayinlanacaktir.</p>
  </main>
</body>
</html>
