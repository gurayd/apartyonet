<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApartYönet | Kullanıcı Girişi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #090d14;
      --line: rgba(152, 175, 214, 0.2);
      --text: #e8eefc;
      --muted: #9fb0cf;
      --primary: #2ea0ff;
      --primary-2: #1676d1;
      --card: rgba(14, 22, 37, 0.82);
      --danger: #f87171;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Manrope", system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(1200px 600px at 10% -20%, rgba(46, 160, 255, 0.32), transparent 60%),
        radial-gradient(1000px 520px at 90% -10%, rgba(92, 240, 210, 0.16), transparent 64%),
        radial-gradient(900px 500px at 50% 120%, rgba(22, 118, 209, 0.26), transparent 66%),
        linear-gradient(180deg, #090d14, #070a12 48%, #06090f);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(rgba(159, 176, 207, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(159, 176, 207, 0.06) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 82%);
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .panel {
      width: min(720px, 100%);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 30px;
      background: linear-gradient(165deg, rgba(17, 26, 43, 0.9), var(--card));
      box-shadow: 0 24px 48px rgba(4, 8, 16, 0.45);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .brand img {
      height: 42px;
      width: auto;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      line-height: 1.14;
      letter-spacing: -0.02em;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .form {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 0.86rem;
      color: #cfddf7;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      border: 1px solid rgba(152, 175, 214, 0.35);
      background: rgba(9, 14, 24, 0.72);
      color: #f2f6ff;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 0.94rem;
    }

    .field input:focus {
      outline: none;
      border-color: rgba(46, 160, 255, 0.9);
      box-shadow: 0 0 0 3px rgba(46, 160, 255, 0.18);
    }

    .error {
      min-height: 20px;
      color: var(--danger);
      font-size: 0.86rem;
      margin-top: 4px;
    }

    .actions {
      margin-top: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 700;
      border: 1px solid transparent;
      transition: transform 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .btn-ghost {
      color: #d9e5ff;
      border-color: rgba(152, 175, 214, 0.35);
      background: rgba(17, 26, 43, 0.55);
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="/js/authz.js"></script>
</head>
<body>
  <main class="page">
    <section class="panel">
      <a class="brand" href="/index.html" aria-label="ApartYönet Anasayfa">
        <img src="assets/apartyonet-logo-white-transparent.svg" alt="ApartYönet logo" />
        <span>ApartYönet</span>
      </a>

      <h1>Kullanıcı girişi</h1>
      <p>Site yöneticisi, yönetici yardımcısı veya kat sakini hesabınızla giriş yapın.</p>

      <form id="loginForm" class="form" novalidate>
        <div class="field">
          <label for="email">E-posta</label>
          <input type="email" id="email" autocomplete="username" required placeholder="yonetici@ornek.com" />
        </div>
        <div class="field">
          <label for="password">Şifre</label>
          <input type="password" id="password" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <div id="error" class="error"></div>
        <div class="actions">
          <button id="submitBtn" class="btn btn-primary" type="submit">Giriş Yap</button>
          <a class="btn btn-ghost" href="/index.html">Anasayfaya Dön</a>
        </div>
      </form>
    </section>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC5D36t8qeWlXXCwvJdt_uZ7jjk3-R8oVk",
      authDomain: "apartyonet-af6d3.firebaseapp.com",
      projectId: "apartyonet-af6d3",
      storageBucket: "apartyonet-af6d3.firebasestorage.app",
      messagingSenderId: "825430154124",
      appId: "1:825430154124:web:7156fa0462fcfc222414a9"
    };

    const app = firebase.apps && firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
    const auth = app.auth();
    const db = app.firestore();
    let authChecked = false;

    function withTimeout(promise, ms, message) {
      let timer = null;
      const timeout = new Promise((_, reject) => {
        timer = setTimeout(() => reject(new Error(message)), ms);
      });
      return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
    }

    function showError(message) {
      document.getElementById("error").textContent = message || "";
    }

    function getSafeNextPath() {
      const raw = new URLSearchParams(window.location.search).get("next");
      if (!raw) return "";
      if (!raw.startsWith("/")) return "";
      if (raw.startsWith("//")) return "";
      return raw;
    }

    function parseSlugFromPath(pathValue) {
      const basePath = String(pathValue || "").split("?")[0].trim();
      const slug = basePath.replace(/^\/+|\/+$/g, "");
      if (!slug) return "";
      if (slug.includes("/")) return "";
      if (slug.includes(".")) return "";
      const reserved = ["login", "admin", "admin-yonetimi", "basvuru", "demo", "index"];
      if (reserved.includes(slug.toLowerCase())) return "";
      return slug;
    }

    async function resolvePublishedAccess(siteId) {
      if (!siteId || siteId === "*") return null;
      const normalized = slugifySiteId(siteId);
      const direct = await db.collection("published_sites").doc(siteId).get();
      if (direct.exists) {
        const row = direct.data() || {};
        if (row.slug) return row;
      }
      if (normalized && normalized !== siteId) {
        const byNormalized = await db.collection("published_sites").doc(normalized).get();
        if (byNormalized.exists) {
          const row = byNormalized.data() || {};
          if (row.slug) return row;
        }
      }
      const byField = await db.collection("published_sites")
        .where("siteId", "==", normalized || siteId)
        .limit(1)
        .get();
      if (byField.empty) return null;
      const row = byField.docs[0].data() || {};
      return row.slug ? row : null;
    }

    async function resolvePublishedBySlug(slug) {
      if (!slug) return null;
      const normalizedSlug = slugifySiteId(slug);
      const direct = await db.collection("published_sites").doc(normalizedSlug).get();
      if (direct.exists) return direct.data() || null;
      return null;
    }

    async function routeByProfile(user) {
      await withTimeout(
        ensureBootstrapAdminProfile(db, user),
        8000,
        "Profil doğrulama zaman aşımına uğradı. Reklam engelleyiciyi kapatıp tekrar deneyin."
      );
      const profile = await withTimeout(
        getCurrentUserProfile(db, user.uid),
        8000,
        "Kullanıcı profili okunamadı (ağ/izin problemi). Tekrar deneyin."
      );
      if (!profile) {
        await auth.signOut();
        throw new Error("Bu hesap için kullanıcı profili bulunamadı. Yönetici ile iletişime geçin.");
      }
      if (!isProfileActive(profile)) {
        await auth.signOut();
        throw new Error("Hesabınız pasif durumda. Yönetici ile iletişime geçin.");
      }

      if (canAccess("admin_panel", profile.role)) {
        window.location.href = "/admin.html";
        return;
      }
      if (canAccess("demo_panel", profile.role)) {
        const nextPath = getSafeNextPath();
        const requestedSlug = parseSlugFromPath(nextPath);
        if (requestedSlug) {
          const requestedPublication = await resolvePublishedBySlug(requestedSlug);
          if (!requestedPublication) {
            throw new Error("Bu apartman paneli yayında değil.");
          }
          if (slugifySiteId(requestedPublication.siteId || "") !== slugifySiteId(profile.siteId || "")) {
            throw new Error("Bu apartman paneline erişim yetkiniz yok.");
          }
          if (requestedPublication.status === "suspended" && requestedPublication.suspensionMode === "blocked") {
            window.alert("Bu site yayından askıya alınmıştır. Giriş geçici olarak kapalıdır.");
            throw new Error("Bu site yayından askıya alınmıştır. Yöneticinizle iletişime geçin.");
          }
          if (requestedPublication.status !== "published" && requestedPublication.status !== "suspended") {
            throw new Error("Site yayına uygun durumda değil. Yönetici ile iletişime geçin.");
          }
          window.location.href = nextPath;
          return;
        }

        const pub = await resolvePublishedAccess(profile.siteId);
        if (!pub) {
          throw new Error("Bu site henüz yayımlanmadı. Lütfen ApartYönet yönetimi ile iletişime geçin.");
        }
        if (pub.status === "suspended" && pub.suspensionMode === "blocked") {
          window.alert("Bu site yayından askıya alınmıştır. Giriş geçici olarak kapalıdır.");
          throw new Error("Bu site yayından askıya alınmıştır. Yöneticinizle iletişime geçin.");
        }
        if (pub.status !== "published" && pub.status !== "suspended") {
          throw new Error("Site yayına uygun durumda değil. Yönetici ile iletişime geçin.");
        }
        window.location.href = "/" + encodeURIComponent(pub.slug);
        return;
      }

      await auth.signOut();
      throw new Error("Rol tanımı geçersiz. Yönetici ile iletişime geçin.");
    }

    async function resetSessionForManualLogin() {
      try {
        await auth.signOut();
      } catch (err) {
        console.error(err);
      }
      authChecked = true;
    }

    const loginInitPromise = resetSessionForManualLogin();

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      showError("");

      const email = normalizeEmail(document.getElementById("email").value);
      const password = document.getElementById("password").value;
      const submitBtn = document.getElementById("submitBtn");

      if (!email || !password) {
        showError("E-posta ve sifre zorunludur.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Giris yapiliyor...";

      try {
        await loginInitPromise;
        authChecked = false;
        const cred = await auth.signInWithEmailAndPassword(email, password);
        await routeByProfile(cred.user);
        authChecked = true;
      } catch (err) {
        let msg = "Giris basarisiz. Bilgileri kontrol edin.";
        if (err && err.code === "auth/user-not-found") msg = "Bu e-posta ile bir hesap bulunamadi.";
        else if (err && err.code === "auth/wrong-password") msg = "Sifre hatali.";
        else if (err && err.code === "auth/invalid-credential") msg = "E-posta veya sifre hatali.";
        else if (err && err.code === "auth/invalid-email") msg = "E-posta formati gecersiz.";
        else if (err && err.message) msg = err.message;
        showError(msg);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Giriş Yap";
      }
    });
  </script>
</body>
</html>
